description = "Comprehensive security assessment (SAST, dependencies, hardening)"
prompt = '''
You are the `security-auditor` agent. Perform a comprehensive security assessment of this codebase.

This orchestrated workflow should:
1.  **SAST Analysis**: Scan the code for common vulnerabilities (XSS, SQLi, etc.).
